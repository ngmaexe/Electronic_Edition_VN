<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../Assets/reset.css" />
    <link rel="stylesheet" href="../Assets/styles.css" />
    <link
      rel="shortcut icon"
      href="../Assets/img/stars.png"
      type="image/x-icon"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
      integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title><!-- Book title here --></title>
  </head>
  <body>
    <div class="book_title">
      <!-- Book title here -->
    </div>

    <!-- Mục lục -->

    <div class="book_outline">Mục lục:</div>

    <div class="book_toc">
      <table class="book_outline">
        <!--bắt đầu-->
        <tr>
          <td class="book_contents_chapter_number">&nbsp;</td>
          <td class="book_contents_chapter_title">
            <a href="#ch1"> <!--chapter title--> </a>
            <!--lưu ý chapter number-->
          </td>
        </tr>
        <!--kết thúc-->

        <tr>
          <td class="book_contents_chapter_number">1&nbsp;&nbsp;</td>
          <td class="book_contents_chapter_title">
            <a href="#ch2"><!--chapter title--></a>
            <!--lưu ý chapter number-->
          </td>
        </tr>
      </table>
    </div>

    <!-- Chương -->
    <!-- -------------- -->
    <div class="book_chapter_header">
      <table width="100%" cellspacing="0" cellpadding="0">
        <tr>
          <td colspan="3"><hr class="book_chapter_topline" /></td>
        </tr>
        <tr class="book_chapterinfoline">
          <td class="caret" align="left">
            <span class="book_chapter_header_chapternumber"
              ><!-- tên chương --></span
            >
            <!--luưu ý phần chapter ở sau href-->
            <a href=""><i class="fa-solid fa-spa"></i></a>
            <a href="#!"><i class="fa-solid fa-angle-up"></i></a>
            <a href="#ch2"><i class="fa-solid fa-angle-down"></i></a>
          </td>
          <td align="right">
            <span class="book_chapter_header_chapternumber"
              ><!-- tên sách --></span
            >
          </td>
        </tr>
      </table>
    </div>

    <a name="ch1"></a>
    <!-- số chương -->

    <div>
      <div class="discourse_box">
        <p class="title"><!-- tên chương --></p>
        <p class="xuat_ban_trong">
          Xuất bản trong: <br />
          <a href="./frame"> <!-- link sách, start with ./ --></a>
        </p>
        <p class="notes">Ghi chú: N/A</p>
      </div>

      <div class="book_chapter_title"><!-- tên chương --></div>
      <p class="paragraph">
        <!-- khổ 1 -->
      </p>
      <p class="paragraph">
        <!-- khổ 2 -->
      </p>

      <p class="paragraph"></p>
      <p class="paragraph"></p>
      <p class="paragraph"></p>
      <p class="paragraph"></p>
      <p class="paragraph"></p>
    </div>

    <!--Chú thích-->
    <!-- gắn vào văn bản -->
    <a href="#gc1">(1)</a>
    <!-- để cuối trang -->
    <p class="footnotes_line"></p>
    <hr class="footnote" />
    <p class="para_footnote">
      <a name="gc1">(1) </a>
      <!-- chú thích 1 -->
    </p>
    <!-- hết chú thích -->

</html>
